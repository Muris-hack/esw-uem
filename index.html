<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ESW UEM">
<meta name="description" content="Gerenciador de aulas, faltas e notas — Engenharia de Software UEM">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<title>ESW UEM — Horário</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --bg2: #141720;
    --bg3: #1c2030;
    --bg4: #242840;
    --surface: #1e2235;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0f2ff;
    --text2: #8b90a8;
    --text3: #555a72;
    --accent: #6c63ff;
    --accent2: #8b85ff;
    --accent-soft: rgba(108,99,255,0.15);
    --green: #3ecf8e;
    --green-soft: rgba(62,207,142,0.12);
    --red: #ff5e5e;
    --red-soft: rgba(255,94,94,0.12);
    --amber: #ffb347;
    --amber-soft: rgba(255,179,71,0.12);
    --blue: #4fa3e0;
    --r: 14px;
    --r-sm: 8px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    display: flex;
    flex-direction: column;
    padding-top: var(--safe-top);
  }

  /* SCROLLABLE MAIN */
  .app-shell {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }

  .top-bar {
    padding: 14px 20px 0;
    flex-shrink: 0;
  }

  .scroll-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: calc(80px + var(--safe-bottom));
  }

  /* STATUSBAR */
  .statusbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    font-family: 'Syne', sans-serif;
    margin-bottom: 10px;
  }

  /* HEADER */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 4px 0 14px;
  }
  .header-left h1 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .header-left p { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #e875a8);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; color: #fff;
  }

  /* SEMESTER PILLS */
  .sem-row { display: flex; gap: 8px; padding: 0 20px 14px; }
  .sem-pill {
    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all .2s; border: 1px solid var(--border);
    color: var(--text2); background: transparent;
    font-family: 'Syne', sans-serif;
  }
  .sem-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* SUMMARY */
  .summary-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 10px; padding: 0 20px 18px;
  }
  .sum-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 12px; text-align: center;
  }
  .sum-card .val { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; line-height: 1; }
  .sum-card .lbl { font-size: 10px; color: var(--text2); margin-top: 4px; line-height: 1.3; }

  /* TABS */
  .tabs-row {
    display: flex; padding: 0 20px; gap: 4px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .tab-btn {
    padding: 10px 14px; font-size: 13px; font-weight: 500; color: var(--text3);
    cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s;
    white-space: nowrap; font-family: 'Syne', sans-serif;
    background: none; border-top: none; border-left: none; border-right: none;
  }
  .tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent); }

  /* PANELS */
  .panel { display: none; padding: 16px 20px 0; }
  .panel.active { display: block; }

  /* SUBJECT CARD */
  .subj-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); margin-bottom: 12px; overflow: hidden;
    transition: border-color .2s; cursor: pointer;
  }
  .subj-card.open { border-color: var(--border2); }
  .subj-header { padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
  .subj-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .subj-info { flex: 1; min-width: 0; }
  .subj-name {
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .subj-code { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .subj-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .absence-badge {
    font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px;
    font-family: 'Syne', sans-serif;
  }
  .ab-ok { background: var(--green-soft); color: var(--green); }
  .ab-warn { background: var(--amber-soft); color: var(--amber); }
  .ab-danger { background: var(--red-soft); color: var(--red); }
  .chevron { font-size: 12px; color: var(--text3); transition: transform .2s; }
  .subj-card.open .chevron { transform: rotate(180deg); }

  /* DETAIL */
  .subj-detail { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
  .subj-card.open .subj-detail { display: block; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }
  .det-stat { background: var(--bg3); border-radius: var(--r-sm); padding: 10px 12px; }
  .det-stat .ds-val { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; }
  .det-stat .ds-lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }

  .section-title {
    font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
    color: var(--text3); text-transform: uppercase; letter-spacing: .08em;
    margin-bottom: 8px; margin-top: 14px;
  }
  .absence-controls { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .abs-btn {
    width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border2);
    background: var(--bg4); color: var(--text); font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .15s; line-height: 1;
  }
  .abs-btn:active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent2); }
  .abs-count { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; min-width: 32px; text-align: center; }
  .abs-limit { font-size: 11px; color: var(--text2); }
  .progress-bar { height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; margin-top: 8px; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width .3s ease; }

  .grades-list { display: flex; flex-direction: column; gap: 6px; }
  .grade-item {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg3); border-radius: var(--r-sm); padding: 10px 12px;
  }
  .grade-name { flex: 1; font-size: 13px; color: var(--text); }
  .grade-val { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; min-width: 36px; text-align: right; }
  .gv-good { color: var(--green); }
  .gv-ok { color: var(--amber); }
  .gv-bad { color: var(--red); }
  .gv-empty { color: var(--text3); }

  .grade-input-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
  .grade-input-name, .grade-input-val {
    background: var(--bg4); border: 1px solid var(--border); border-radius: var(--r-sm);
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px;
    padding: 8px 12px; outline: none; transition: border-color .15s;
  }
  .grade-input-name { flex: 1; }
  .grade-input-val { width: 72px; }
  .grade-input-name:focus, .grade-input-val:focus { border-color: var(--accent); }
  .add-btn {
    background: var(--accent); color: #fff; border: none; border-radius: var(--r-sm);
    padding: 8px 14px; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
  }
  .add-btn:active { opacity: .8; }
  .del-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; line-height: 1; padding: 2px; }
  .del-btn:active { color: var(--red); }

  .avg-row { display: flex; gap: 10px; margin-top: 12px; }
  .avg-chip { background: var(--bg3); border-radius: var(--r-sm); padding: 8px 12px; text-align: center; flex: 1; }
  .avg-chip .av { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }
  .avg-chip .al { font-size: 11px; color: var(--text2); margin-top: 2px; }

  /* FALTAS & NOTAS panels share card styles above */

  /* OVERLAY */
  .overlay {
    position: fixed; inset: 0; background: var(--bg2); z-index: 200;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: calc(var(--safe-top) + 14px) 20px calc(80px + var(--safe-bottom));
  }
  .overlay-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .back-btn {
    background: var(--bg4); border: none; color: var(--text2);
    width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
  }
  .overlay-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg2); border-top: 1px solid var(--border);
    display: flex; padding: 8px 8px calc(8px + var(--safe-bottom)); gap: 4px;
    z-index: 100;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 8px 4px; border-radius: 12px; cursor: pointer; transition: background .15s;
    font-size: 10px; color: var(--text3); font-family: 'Syne', sans-serif; font-weight: 600;
    text-transform: uppercase; letter-spacing: .04em; background: none; border: none;
  }
  .nav-item.active { background: var(--accent-soft); color: var(--accent2); }
  .nav-icon { font-size: 20px; line-height: 1; }

  .ov-title {
    font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
    color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px;
  }
</style>
</head>
<body>
<div class="app-shell">
  <!-- TOP FIXED -->
  <div class="top-bar">
    <div class="statusbar">
      <span id="clock">--:--</span>
      <span>UEM · ESW</span>
    </div>
    <div class="header">
      <div class="header-left">
        <h1 id="main-title">Minhas Aulas</h1>
        <p>Engenharia de Software · 2026</p>
      </div>
      <div class="avatar">ME</div>
    </div>
  </div>

  <!-- SEMESTER PILLS -->
  <div class="sem-row">
    <button class="sem-pill active" onclick="setSem(1)">1º Semestre</button>
    <button class="sem-pill" onclick="setSem(2)">2º Semestre</button>
  </div>

  <!-- SUMMARY -->
  <div class="summary-row" id="summary-row"></div>

  <!-- TABS (fixed) -->
  <div class="tabs-row">
    <button class="tab-btn active" onclick="setTab('disciplinas')">Disciplinas</button>
    <button class="tab-btn" onclick="setTab('faltas')">Faltas</button>
    <button class="tab-btn" onclick="setTab('notas')">Notas</button>
  </div>

  <!-- SCROLL AREA -->
  <div class="scroll-area">
    <div class="panel active" id="panel-disciplinas"></div>
    <div class="panel" id="panel-faltas"></div>
    <div class="panel" id="panel-notas"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-item active" id="nav-aulas" onclick="setMainView('aulas')">
    <span class="nav-icon">📚</span>Aulas
  </button>
  <button class="nav-item" id="nav-agenda" onclick="setMainView('agenda')">
    <span class="nav-icon">📅</span>Agenda
  </button>
  <button class="nav-item" id="nav-stats" onclick="setMainView('stats')">
    <span class="nav-icon">📊</span>Stats
  </button>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const COLORS = ['#6c63ff','#3ecf8e','#ff5e5e','#ffb347','#4fa3e0','#e875a8','#3ec9cf','#a3e07a'];

const SUBJECTS = {
  1: [
    { id:'9897', name:'Programação Orientada a Objetos', short:'POO', color:COLORS[0], maxFaltas:25 },
    { id:'9895', name:'Organização e Recuperação de Dados', short:'ORD', color:COLORS[1], maxFaltas:17 },
    { id:'9894', name:'Proc. de Software e Eng. de Requisitos', short:'PSR', color:COLORS[2], maxFaltas:17 },
    { id:'9896', name:'Interação Humano Computador', short:'IHC', color:COLORS[3], maxFaltas:17 },
    { id:'11919', name:'Informática e Sociedade', short:'INF·SOC', color:COLORS[4], maxFaltas:17 },
  ],
  2: [
    { id:'9899', name:'Análise e Projeto de Software', short:'APS', color:COLORS[0], maxFaltas:25 },
    { id:'9901', name:'Banco de Dados I', short:'BD1', color:COLORS[1], maxFaltas:17 },
    { id:'9907', name:'Programação de Sistemas Web', short:'PSW', color:COLORS[2], maxFaltas:25 },
    { id:'9911', name:'Sistemas Operacionais', short:'SO', color:COLORS[3], maxFaltas:17 },
    { id:'11917', name:'Programação Funcional', short:'PF', color:COLORS[4], maxFaltas:17 },
  ]
};

const SCHEDULE = {
  1: {
    'Segunda':  ['POO — D67-112 19:30–21:10','PSR — D67-112 21:20–23:00' ],
    'Terça':    ['ORD — D67-103 19:30–21:10', 'IHC — D67-106 21:20–23:00'],
    'Quarta':   ['PSR — D67-106 19:30–21:10', 'POO — D67-112 21:20–23:00'],
    'Quinta':   ['IHC — D67-201 19:30–21:10', 'ORD — D67-102 21:20–23:00'],
    'Sexta':    ['INF·SOC — D67-106 19:30–21:10', 'INF·SOC — D67-106 19:30–23:00'],
    'Sábado':   ['POO — EAD 13:30–15:10'],
  },
  2: {
    'Segunda':  ['APS — EAD 15:20–17:00', 'PSW — EAD 13:30–15:10', 'APS — D67-103 19:30–21:10', 'PSW — D67-106 21:20–23:00'],
    'Terça':    ['PF — D67-103 19:30–21:10', 'BD1 — D67-209 21:20–23:00'],
    'Quarta':   ['APS — EAD 15:20–17:00', 'SO — D67-103 19:30–21:10', 'APS — D67-103 21:20–23:00'],
    'Quinta':   ['BD1 — D67-112 19:30–21:10', 'PF — D67-103 21:20–23:00'],
    'Sexta':    ['SO — D67-103 19:30–21:10', 'PSW — D67-106 21:20–23:00'],
    'Sábado':   [],
  }
};

// STATE
function loadState() {
  try {
    const raw = localStorage.getItem('esw_app_v3');
    if (raw) return JSON.parse(raw);
  } catch(e){}
  const s = {};
  for (const sem of [1,2]) {
    s[sem] = {};
    SUBJECTS[sem].forEach(sub => { s[sem][sub.id] = { faltas: 0, grades: [] }; });
  }
  return s;
}
function saveState() {
  try { localStorage.setItem('esw_app_v3', JSON.stringify(state)); } catch(e){}
}

let state = loadState();
let currentSem = 1;
let currentTab = 'disciplinas';
let openCard = null;

function updateClock() {
  const d = new Date();
  document.getElementById('clock').textContent =
    d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}
updateClock(); setInterval(updateClock, 30000);

// ── HELPERS ───────────────────────────────────────────────────────────────
function getSS(subId) {
  if (!state[currentSem]) state[currentSem] = {};
  if (!state[currentSem][subId]) state[currentSem][subId] = { faltas: 0, grades: [] };
  return state[currentSem][subId];
}
function absClass(f,m) { const p=f/m; return p>=1?'ab-danger':p>=0.6?'ab-warn':'ab-ok'; }
function gradeClass(v) { if(v===null||v===''||v===undefined) return 'gv-empty'; const n=parseFloat(v); return n>=7?'gv-good':n>=5?'gv-ok':'gv-bad'; }
function gradeColor(a) { const n=parseFloat(a); return n>=7?'var(--green)':n>=5?'var(--amber)':'var(--red)'; }
function avg(grades) {
  if (!grades||!grades.length) return null;
  const v = grades.map(g=>parseFloat(g.value)).filter(v=>!isNaN(v));
  if (!v.length) return null;
  return (v.reduce((a,b)=>a+b,0)/v.length).toFixed(1);
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function progColor(f,m) { const p=f/m; return p>=1?'var(--red)':p>=0.6?'var(--amber)':'var(--green)'; }

// ── RENDER SUMMARY ────────────────────────────────────────────────────────
function renderSummary() {
  const subs = SUBJECTS[currentSem];
  let atRisk=0, withGrades=0;
  subs.forEach(s => {
    const ss = getSS(s.id);
    if (ss.faltas/s.maxFaltas >= 0.6) atRisk++;
    if (ss.grades&&ss.grades.length) withGrades++;
  });
  document.getElementById('summary-row').innerHTML = `
    <div class="sum-card">
      <div class="val" style="color:var(--accent2)">${subs.length}</div>
      <div class="lbl">Disciplinas</div>
    </div>
    <div class="sum-card">
      <div class="val" style="color:${atRisk>0?'var(--amber)':'var(--green)'}">${atRisk}</div>
      <div class="lbl">Em risco de faltas</div>
    </div>
    <div class="sum-card">
      <div class="val" style="color:var(--blue)">${withGrades}</div>
      <div class="lbl">Com notas</div>
    </div>`;
}

// ── RENDER DISCIPLINAS ────────────────────────────────────────────────────
function renderDisciplinas() {
  const subs = SUBJECTS[currentSem];
  let html = '';
  subs.forEach(sub => {
    const ss = getSS(sub.id);
    const pct = Math.min(ss.faltas/sub.maxFaltas,1);
    const pc = progColor(ss.faltas,sub.maxFaltas);
    const a = avg(ss.grades);
    const isOpen = openCard === sub.id;
    let gradeItems = '';
    if (ss.grades&&ss.grades.length) {
      ss.grades.forEach((g,gi) => {
        gradeItems += `<div class="grade-item">
          <span class="grade-name">${esc(g.name)}</span>
          <span class="grade-val ${gradeClass(g.value)}">${g.value}</span>
          <button class="del-btn" onclick="delGrade('${sub.id}',${gi});event.stopPropagation()">×</button>
        </div>`;
      });
    } else {
      gradeItems = '<div style="font-size:12px;color:var(--text3);padding:6px 0">Nenhuma avaliação lançada.</div>';
    }
    html += `
    <div class="subj-card ${isOpen?'open':''}" id="card-${sub.id}" onclick="toggleCard('${sub.id}')">
      <div class="subj-header">
        <div class="subj-dot" style="background:${sub.color}"></div>
        <div class="subj-info">
          <div class="subj-name">${sub.name}</div>
          <div class="subj-code">${sub.id} · máx ${sub.maxFaltas} faltas</div>
        </div>
        <div class="subj-right">
          <span class="absence-badge ${absClass(ss.faltas,sub.maxFaltas)}">${ss.faltas}/${sub.maxFaltas}</span>
          <span style="font-size:11px;color:${a?gradeColor(a):'var(--text3)'}">${a?'Média '+a:'Sem notas'}</span>
        </div>
        <span class="chevron">▾</span>
      </div>
      <div class="subj-detail">
        <div class="detail-grid">
          <div class="det-stat"><div class="ds-val" style="color:${pc}">${ss.faltas}</div><div class="ds-lbl">Faltas</div></div>
          <div class="det-stat"><div class="ds-val" style="color:var(--text2)">${sub.maxFaltas-ss.faltas}</div><div class="ds-lbl">Restam</div></div>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct*100}%;background:${pc}"></div></div>
        <div class="section-title" style="margin-top:16px">Controle de Faltas</div>
        <div class="absence-controls">
          <button class="abs-btn" onclick="changeAbs('${sub.id}',-1);event.stopPropagation()">−</button>
          <span class="abs-count">${ss.faltas}</span>
          <button class="abs-btn" onclick="changeAbs('${sub.id}',1);event.stopPropagation()">+</button>
          <span class="abs-limit">de ${sub.maxFaltas}</span>
        </div>
        <div class="section-title">Avaliações</div>
        <div class="grades-list">${gradeItems}</div>
        <div class="grade-input-row" onclick="event.stopPropagation()">
          <input class="grade-input-name" id="gn-${sub.id}" type="text" placeholder="Nome da avaliação" maxlength="30">
          <input class="grade-input-val" id="gv-${sub.id}" type="number" min="0" max="10" step="0.1" placeholder="Nota">
          <button class="add-btn" onclick="addGrade('${sub.id}');event.stopPropagation()">+</button>
        </div>
        ${a?`<div class="avg-row">
          <div class="avg-chip"><div class="av" style="color:${gradeColor(a)}">${a}</div><div class="al">Média</div></div>
          <div class="avg-chip"><div class="av" style="color:${parseFloat(a)>=5?'var(--green)':'var(--red)'}">${parseFloat(a)>=5?'✓ Aprovado':'✗ Reprovado'}</div><div class="al">Status</div></div>
        </div>`:''}
      </div>
    </div>`;
  });
  document.getElementById('panel-disciplinas').innerHTML = html;
}

function toggleCard(id) { openCard = openCard===id?null:id; renderDisciplinas(); }

function changeAbs(subId, delta) {
  const ss = getSS(subId);
  ss.faltas = Math.max(0, ss.faltas+delta);
  saveState(); openCard=subId; renderAll();
}

function addGrade(subId) {
  const ne = document.getElementById('gn-'+subId);
  const ve = document.getElementById('gv-'+subId);
  const name = ne.value.trim(); const val = ve.value.trim();
  if (!name||val==='') return;
  const n = parseFloat(val);
  if (isNaN(n)||n<0||n>10) { ve.style.borderColor='var(--red)'; setTimeout(()=>{ve.style.borderColor='';},1000); return; }
  getSS(subId).grades.push({ name, value: parseFloat(n.toFixed(1)) });
  saveState(); openCard=subId; renderAll();
}

function delGrade(subId, gi) {
  getSS(subId).grades.splice(gi,1);
  saveState(); openCard=subId; renderAll();
}

// ── RENDER FALTAS ─────────────────────────────────────────────────────────
function renderFaltas() {
  let html = '';
  SUBJECTS[currentSem].forEach(sub => {
    const ss = getSS(sub.id);
    const pct = Math.min(ss.faltas/sub.maxFaltas,1);
    const pc = progColor(ss.faltas,sub.maxFaltas);
    const lbl = pct>=1?'Reprovado':pct>=0.6?'Atenção':'OK';
    html += `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:8px;height:8px;border-radius:50%;background:${sub.color}"></div>
        <span style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;flex:1">${sub.short}</span>
        <span class="absence-badge ${absClass(ss.faltas,sub.maxFaltas)}">${lbl}</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:11px;color:var(--text2)">${sub.name}</span>
        <span style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:${pc}">${ss.faltas}/${sub.maxFaltas}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct*100}%;background:${pc}"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:4px">
        <span style="font-size:10px;color:var(--text3)">${Math.round(pct*100)}% utilizado</span>
        <span style="font-size:10px;color:var(--text3)">${sub.maxFaltas-ss.faltas} restam</span>
      </div>
      <div class="absence-controls" style="margin-top:12px">
        <button class="abs-btn" onclick="changeAbs('${sub.id}',-1)" style="width:36px;height:36px">−</button>
        <span class="abs-count">${ss.faltas}</span>
        <button class="abs-btn" onclick="changeAbs('${sub.id}',1)" style="width:36px;height:36px">+</button>
      </div>
    </div>`;
  });
  document.getElementById('panel-faltas').innerHTML = html;
}

// ── RENDER NOTAS ──────────────────────────────────────────────────────────
function renderNotas() {
  let html = '';
  SUBJECTS[currentSem].forEach(sub => {
    const ss = getSS(sub.id);
    const a = avg(ss.grades);
    let gi_html = '';
    if (ss.grades&&ss.grades.length) {
      ss.grades.forEach((g,gi) => {
        gi_html += `<div class="grade-item">
          <span class="grade-name">${esc(g.name)}</span>
          <span class="grade-val ${gradeClass(g.value)}">${g.value}</span>
          <button class="del-btn" onclick="delGradeNotas('${sub.id}',${gi})">×</button>
        </div>`;
      });
    }
    html += `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <div style="width:8px;height:8px;border-radius:50%;background:${sub.color}"></div>
        <span style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;flex:1">${sub.short}</span>
        ${a?`<span style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:${gradeColor(a)}">${a}</span>`:'<span style="font-size:11px;color:var(--text3)">Sem notas</span>'}
      </div>
      <div class="grades-list">${gi_html||'<div style="font-size:12px;color:var(--text3)">Nenhuma avaliação.</div>'}</div>
      <div class="grade-input-row" style="margin-top:10px">
        <input class="grade-input-name" id="gn2-${sub.id}" type="text" placeholder="Nome da avaliação" maxlength="30">
        <input class="grade-input-val" id="gv2-${sub.id}" type="number" min="0" max="10" step="0.1" placeholder="Nota">
        <button class="add-btn" onclick="addGradeNotas('${sub.id}')">+</button>
      </div>
    </div>`;
  });
  document.getElementById('panel-notas').innerHTML = html;
}

function addGradeNotas(subId) {
  const ne=document.getElementById('gn2-'+subId), ve=document.getElementById('gv2-'+subId);
  const name=ne.value.trim(), val=ve.value.trim();
  if (!name||val==='') return;
  const n=parseFloat(val);
  if (isNaN(n)||n<0||n>10){ve.style.borderColor='var(--red)';setTimeout(()=>{ve.style.borderColor='';},1000);return;}
  getSS(subId).grades.push({name,value:parseFloat(n.toFixed(1))});
  saveState(); renderNotas(); renderSummary();
}
function delGradeNotas(subId,gi){getSS(subId).grades.splice(gi,1);saveState();renderNotas();renderSummary();}

// ── OVERLAYS ──────────────────────────────────────────────────────────────
function removeOverlay() {
  document.querySelectorAll('.overlay').forEach(o=>o.remove());
  document.getElementById('nav-aulas').classList.add('active');
  document.getElementById('nav-agenda').classList.remove('active');
  document.getElementById('nav-stats').classList.remove('active');
}

function showAgenda() {
  const days = ['Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const sch = SCHEDULE[currentSem];
  const today = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'][new Date().getDay()];
  let html = `<div class="overlay" id="overlay-agenda">
    <div class="overlay-header">
      <button class="back-btn" onclick="removeOverlay()">←</button>
      <span class="overlay-title">Agenda Semanal</span>
    </div>`;
  days.forEach(day => {
    const aulas = sch[day]||[];
    const isToday = day===today;
    html += `<div style="margin-bottom:16px">
      <div style="font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:${isToday?'var(--accent2)':'var(--text3)'};text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">
        ${day}${isToday?' · Hoje':''}
      </div>`;
    if (aulas.length) {
      aulas.forEach(a => {
        html += `<div style="background:var(--surface);border:1px solid ${isToday?'var(--accent)':'var(--border)'};border-radius:8px;padding:10px 14px;margin-bottom:6px;font-size:13px;color:var(--text)">${a}</div>`;
      });
    } else {
      html += `<div style="font-size:12px;color:var(--text3);padding:6px 0">Sem aulas</div>`;
    }
    html += `</div>`;
  });
  html += `</div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function showStats() {
  const subs = SUBJECTS[currentSem];
  let html = `<div class="overlay" id="overlay-stats">
    <div class="overlay-header">
      <button class="back-btn" onclick="removeOverlay()">←</button>
      <span class="overlay-title">Desempenho</span>
    </div>
    <div class="ov-title">Médias por Disciplina</div>`;
  subs.forEach(sub => {
    const ss = getSS(sub.id);
    const a = avg(ss.grades);
    const val = a?parseFloat(a):0;
    const bc = val>=7?'var(--green)':val>=5?'var(--amber)':'var(--red)';
    html += `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <span style="font-size:13px;color:var(--text)">${sub.short}</span>
        <span style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:${a?bc:'var(--text3)'}">${a||'—'}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${a?val*10:0}%;background:${bc}"></div></div>
    </div>`;
  });
  html += `<div class="ov-title" style="margin-top:24px">% Faltas Utilizadas</div>`;
  subs.forEach(sub => {
    const ss = getSS(sub.id);
    const pct = Math.min(ss.faltas/sub.maxFaltas,1);
    const pc = progColor(ss.faltas,sub.maxFaltas);
    html += `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <span style="font-size:13px;color:var(--text)">${sub.short}</span>
        <span style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:${pc}">${Math.round(pct*100)}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct*100}%;background:${pc}"></div></div>
    </div>`;
  });
  html += `</div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

// ── NAVIGATION ────────────────────────────────────────────────────────────
function setMainView(v) {
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+v).classList.add('active');
  document.querySelectorAll('.overlay').forEach(o=>o.remove());
  if (v==='agenda') { showAgenda(); return; }
  if (v==='stats') { showStats(); return; }
}

function setSem(s) {
  currentSem=s; openCard=null;
  document.querySelectorAll('.sem-pill').forEach((p,i)=>p.classList.toggle('active',i===s-1));
  renderAll();
}

function setTab(t) {
  currentTab=t;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['disciplinas','faltas','notas'][i]===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
  if (t==='faltas') renderFaltas();
  else if (t==='notas') renderNotas();
  else renderDisciplinas();
  renderSummary();
}

function renderAll() {
  renderSummary();
  if (currentTab==='disciplinas') renderDisciplinas();
  else if (currentTab==='faltas') renderFaltas();
  else renderNotas();
}

// INIT
renderAll();

// SERVICE WORKER
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
